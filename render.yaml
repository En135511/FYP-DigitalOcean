services:
  - type: web
    name: brailleai-vision
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/vision.Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: YOLO_MODEL_PATH
        value: /app/model/yolov8_braille.pt
      - key: YOLO_CONF_THRESHOLD
        value: "0.12"
      - key: YOLO_CONF_RETRY_THRESHOLD
        value: "0.08"
      - key: YOLO_IOU_THRESHOLD
        value: "0.30"
      - key: YOLO_BEAM_WIDTH
        value: "4"
      - key: YOLO_MAX_VARIANTS
        value: "2"
      - key: YOLO_TORCH_THREADS
        value: "1"
      - key: YOLO_CV_THREADS
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"

  - type: web
    name: brailleai-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/render/backend.Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: VISION_SERVICE_HOSTPORT
        fromService:
          type: web
          name: brailleai-vision
          property: hostport
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "*"
      - key: JAVA_TOOL_OPTIONS
        value: "-Xms128m -Xmx320m -DLOUIS_CLI_PATH=/usr/bin/lou_translate -DLOUIS_TABLE=/usr/share/liblouis/tables/en-us-g2.ctb -Dapp.cors.allowed-origins=*"

  - type: web
    name: brailleai-ui
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/ui.Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: brailleai-backend
          property: hostport
